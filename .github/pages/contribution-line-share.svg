<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">贡献者代码行变更占比</title>
  <desc id="desc">按 git log numstat 统计代码类文件的新增与删除行总和。</desc>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --panel-stroke: #e2e8f0;
      --title: #0f172a;
      --text: #334155;
      --muted: #64748b;
      --ring-bg: #e2e8f0;
      --inner: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --panel-stroke: #334155;
        --title: #f8fafc;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --ring-bg: #1e293b;
        --inner: #0f172a;
      }
    }
    .bg { fill: var(--bg); }
    .panel { fill: var(--panel); stroke: var(--panel-stroke); stroke-width: 1; }
    .title-text { fill: var(--title); }
    .label-text, .value-text { fill: var(--text); }
    .muted-text { fill: var(--muted); }
    .ring-bg { fill: var(--ring-bg); }
    .inner-ring { fill: var(--inner); }
  </style>
  <rect class="bg" width="100%" height="100%" rx="20"/>
  <rect class="panel" x="16" y="16" width="928" height="508" rx="18"/>
  <text x="48" y="64" class="title-text" font-size="32" font-weight="700">贡献者代码行变更占比</text>
  <text x="48" y="98" class="muted-text" font-size="18">统计口径：main 分支全部历史提交，代码类文件新增行 + 删除行</text>
  <text x="48" y="124" class="muted-text" font-size="16">自动更新时间：2026-05-11 11:35 UTC</text>
  <circle cx="255" cy="270" r="150" class="ring-bg" />
  <circle cx="255" cy="270" r="150" fill="#2563eb" />
  <circle cx="255" cy="270" r="74" class="inner-ring" />
  <text x="255" y="266" class="muted-text" text-anchor="middle" font-size="18">总变更</text>
  <text x="255" y="300" class="title-text" text-anchor="middle" font-size="34" font-weight="700">1,083,105</text>
  <rect x="500" y="165" width="18" height="18" rx="4" fill="#2563eb" />
<text x="530" y="179" class="label-text" font-size="24" font-weight="700">Wslave</text>
<text x="760" y="179" class="value-text" font-size="22" text-anchor="end">100.0%</text>
<text x="530" y="209" class="muted-text" font-size="18">变更 1,083,105 行（+786,802 / -296,303）</text><rect x="500" y="257" width="18" height="18" rx="4" fill="#f97316" />
<text x="530" y="271" class="label-text" font-size="24" font-weight="700">Charles-0509</text>
<text x="760" y="271" class="value-text" font-size="22" text-anchor="end">0.0%</text>
<text x="530" y="301" class="muted-text" font-size="18">变更 0 行（+0 / -0）</text>
</svg>

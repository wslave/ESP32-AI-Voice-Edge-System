  <circle cx="255" cy="250" r="74" class="inner-ring" />
  <text x="255" y="246" class="muted-text" text-anchor="middle" font-size="18">总变更</text>
  <text x="255" y="280" class="title-text" text-anchor="middle" font-size="34" font-weight="700">1,084,279</text>
  <rect x="500" y="160" width="18" height="18" rx="4" fill="#2563eb" />
<text x="530" y="174" class="label-text" font-size="24" font-weight="700">Wslave</text>
<text x="760" y="174" class="value-text" font-size="22" text-anchor="end">99.9%</text>
